<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Neon Vault</title>
    <style>
        :root { --bg: #000; --text: #39FF14; --border: 2px solid #39FF14; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #container { margin: 5px; flex-grow: 1; display: flex; flex-direction: column; border: var(--border); box-shadow: 0 0 15px #39FF14; }
        #toolbar { padding: 10px; background: #111; display: flex; gap: 8px; border-bottom: var(--border); flex-wrap: wrap; }
        #viewer { max-height: 200px; overflow: hidden; display: flex; justify-content: center; background: #050505; }
        #viewer img, #viewer video { max-height: 200px; border: 1px solid #39FF14; }
        textarea { flex-grow: 1; background: transparent; color: var(--text); border: none; padding: 15px; font-size: 16px; outline: none; }
        input, select, button { background: #000; color: var(--text); border: 1px solid var(--text); padding: 5px; cursor: pointer; }
        button:hover { background: var(--text); color: #000; }
        #console { height: 80px; background: #050505; border-top: var(--border); padding: 10px; overflow-y: auto; font-size: 12px; color: #39FF14; opacity: 0.7; }
    </style>
</head>
<body>

<div id="container">
    <div id="toolbar">
        <input type="text" id="fileName" placeholder="filename" style="width:80px;">
        <select id="extension">
            <option value=".txt">.txt</option>
            <option value=".html">.html</option>
            <option value=".py">.py</option>
            <option value=".run">.run</option>
            <option value=".pdf">.pdf</option>
        </select>
        <button onclick="internalSave()">SAVE (5MB)</button>
        <button onclick="importFile()">IMPORT/VIEW</button>
        <button onclick="exportFile()">DOWNLOAD</button>
        <button onclick="runCode()">RUN</button>
        <button onclick="clearAll()" style="color:red; border-color:red;">WIPE</button>
    </div>

    <div id="viewer"></div> <textarea id="editor" placeholder="System Ready..."></textarea>
    
    <div id="console">Console: Operational.</div>
</div>

<script>
    window.onload = () => {
        const saved = localStorage.getItem('vault_data');
        if (saved) { document.getElementById('editor').value = saved; log("Restored session."); }
    };

    function log(msg) {
        const c = document.getElementById('console');
        c.innerHTML += `<br>> ${msg}`;
        c.scrollTop = c.scrollHeight;
    }

    function internalSave() {
        localStorage.setItem('vault_data', document.getElementById('editor').value);
        log("Data secured internally.");
    }

    function importFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const file = e.target.files[0];
            const viewer = document.getElementById('viewer');
            const editor = document.getElementById('editor');
            const url = URL.createObjectURL(file);
            viewer.innerHTML = ""; // Clear old media

            if (file.type.includes('image')) {
                viewer.innerHTML = `<img src="${url}">`;
                log(`Viewing Image: ${file.name}`);
            } else if (file.type.includes('video')) {
                viewer.innerHTML = `<video src="${url}" controls></video>`;
                log(`Playing Video: ${file.name}`);
            } else {
                const reader = new FileReader();
                reader.onload = (ev) => { editor.value = ev.target.result; log(`Imported Text: ${file.name}`); };
                reader.readAsText(file);
            }
        };
        input.click();
    }

    function exportFile() {
        const text = document.getElementById('editor').value;
        const name = (document.getElementById('fileName').value || "export") + document.getElementById('extension').value;
        const blob = new Blob([text], { type: "text/plain" });
        const link = document.createElement("a");
        link.download = name;
        link.href = window.URL.createObjectURL(blob);
        link.click();
        log(`Downloaded ${name}`);
    }

    function runCode() {
        const code = document.getElementById('editor').value;
        const ext = document.getElementById('extension').value;
        try {
            if(ext === '.html') {
                const win = window.open();
                win.document.write(code);
            } else {
                eval(code);
                log("Code execution finished.");
            }
        } catch (e) { log("ERR: " + e.message); }
    }

    function clearAll() {
        if(confirm("Wipe everything?")) {
            document.getElementById('editor').value = "";
            document.getElementById('viewer').innerHTML = "";
            localStorage.removeItem('vault_data');
            log("System Wiped.");
        }
    }
</script>

</body>
</html>
