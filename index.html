<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Neon Vault</title>
    <style>
        :root { 
            --bg: #000000; 
            --text: #39FF14; 
            --accent: #39FF14; 
            --border: 3px solid #39FF14;
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Courier New', monospace; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }
        /* Neon Border Container */
        #container {
            margin: 10px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            border: var(--border);
            box-shadow: 0 0 10px #39FF14;
        }
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #toolbar { 
            padding: 15px; 
            background: #111; 
            display: flex; 
            gap: 10px; 
            border-bottom: var(--border); 
            flex-wrap: wrap; 
        }
        textarea { 
            flex-grow: 1; 
            background: transparent; 
            color: var(--text); 
            border: none; 
            padding: 20px; 
            font-size: 16px; 
            resize: none; 
            outline: none; 
            line-height: 1.5; 
        }
        input, select, button { 
            background: black; 
            color: var(--text); 
            border: 1px solid var(--accent); 
            padding: 8px; 
            border-radius: 0; 
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover { background: var(--accent); color: black; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h2>KEY REQUIRED</h2>
    <input type="password" id="passkey" placeholder="Enter Key">
    <br>
    <button onclick="unlock()">UNLOCK</button>
</div>

<div id="container">
    <div id="toolbar">
        <input type="text" id="fileName" placeholder="filename" value="vault_entry">
        
        <select id="extension">
            <option value=".txt">.txt</option>
            <option value=".html">.html</option>
            <option value=".py">.py</option>
            <option value=".js">.js</option>
            <option value=".mp3">.mp3</option>
            <option value=".mp4">.mp4</option>
            <option value=".run">.run</option>
            <option value=".exe">.exe</option>
        </select>

        <button onclick="saveFile()">Save & Clear</button>
        <button onclick="importMedia()">Import/Open</button>
    </div>

    <textarea id="editor" placeholder="Write or paste your data here..."></textarea>
</div>

<script>
    const MASTER_KEY = "1234"; // Set your password here

    function unlock() {
        const input = document.getElementById('passkey').value;
        if(input === MASTER_KEY) {
            document.getElementById('auth-overlay').classList.add('hidden');
        } else {
            alert("ACCESS DENIED");
        }
    }

    function saveFile() {
        const text = document.getElementById('editor').value;
        const name = document.getElementById('fileName').value;
        const ext = document.getElementById('extension').value;
        
        if(!text) return;

        const blob = new Blob([text], { type: "text/plain" });
        const link = document.createElement("a");
        
        link.download = name + ext;
        link.href = window.URL.createObjectURL(blob);
        link.click();

        // Clear Screen Logic
        document.getElementById('editor').value = "";
        window.URL.revokeObjectURL(link.href);
    }

    function importMedia() {
        // Creates a virtual file input to trigger device storage
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => { 
            const file = e.target.files[0];
            alert("Loaded: " + file.name + " (Ready for processing)");
        }
        input.click();
    }
</script>

</body>
</html>
